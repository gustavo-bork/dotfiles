###############
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,highrr,auto,1
monitor=HDMI-A-3,highrr,auto,1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = nm-applet & blueman-applet
exec-once = waybar & hyprpaper

source = ~/.dotfiles/hypr/env.conf
source = ~/.dotfiles/hypr/animations.conf
source = ~/.dotfiles/hypr/config.conf
source = ~/.dotfiles/hypr/keyboard.conf
source = ~/.dotfiles/hypr/bindings.conf
source = ~/.dotfiles/hypr/window-rules.conf
